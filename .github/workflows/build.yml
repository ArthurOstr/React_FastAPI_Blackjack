name: Blackjack CI Pipeline

on:
  push:
    branches: [ "feature/fastapi-migration" ]
  pull_request:
    branches: [ "feature/fastapi-migration" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        echo "POSTGRES_USER=testuser" >> .env
        echo "POSTGRES_PASSWORD=testpass" >> .env
        echo "POSTGRES_DB=testdb" >> .env
        echo "SECRET_KEY=at_least_thirty_two_characters_long_security_key" >> .env

    - name: Build and Start Containers
      run: docker compose up -d --build

    - name: Wait for Services (Health Check)
      run: sleep 10

    - name: Run Pytest in Backend Container
      run: docker compose exec -T backend pytest tests/test_api.py -v

    - name: Shutdown Containers
      if: always()
      run: docker compose down
